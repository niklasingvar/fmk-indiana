<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indiana</title>
  <style>
    :root {
      --bg: rgba(255, 255, 255, 0.78);
      --divider: rgba(0, 0, 0, 0.10);
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --hover-bg: rgba(0, 0, 0, 0.06);
      --highlight: #0a84ff;
      --dot-running: #30d158;
      --dot-stopped: #aeaeb2;
      --shadow: 0 4px 18px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
      --radius: 10px;
      --font-size: 13px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: rgba(40, 40, 42, 0.78);
        --divider: rgba(255, 255, 255, 0.10);
        --text: #f5f5f7;
        --text-secondary: #98989d;
        --hover-bg: rgba(255, 255, 255, 0.08);
        --shadow: 0 4px 18px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.24);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: var(--font-size);
      color: var(--text);
      overflow: hidden;
    }
    #panel {
      margin: 8px;
      background: var(--bg);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 0.5px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }
    /*
     * Menu items
     */
    .menu-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
      margin: 2px 6px;
      height: 28px;
    }
    .menu-item:hover {
      background: var(--hover-bg);
    }
    .menu-item .label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
    }
    .menu-item .meta {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 8px;
    }
    .menu-item.action {
      color: var(--text-secondary);
    }
    .separator {
      height: 1px;
      background: var(--divider);
      margin: 4px 12px;
    }
    /*
     * Folder list
     */
    #folders { list-style: none; }
    #empty {
      text-align: center;
      padding: 20px 12px 16px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
    }
    #empty:hover { color: var(--text); }
    /*
     * Status bar
     */
    #status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      flex-shrink: 0;
    }
    #status-dot.running { background: var(--dot-running); }
    #status-dot.stopped { background: var(--dot-stopped); }
    #status-dot.spinning {
      background: transparent;
      border: 1.5px solid var(--dot-stopped);
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-left {
      display: flex;
      align-items: center;
    }
    #status-action {
      background: none;
      border: none;
      color: var(--text-secondary);
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    #status-action:hover { color: var(--text); }
    /*
     * Copied flash
     */
    .copied-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--text);
      color: var(--bg);
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .copied-flash.show { opacity: 1; }
  </style>
  <div id="panel">
    <ul id="folders"></ul>
    <div id="empty">Monitor a folder...</div>
    <div id="add-item" class="menu-item action">
      <span class="label">Add Folder...</span>
    </div>
    <div class="separator"></div>
    <div id="status">
      <div id="status-left">
        <div id="status-dot" class="stopped"></div>
        <span id="status-label">Server stopped</span>
      </div>
      <button id="status-action">Start</button>
    </div>
  </div>
  <div id="copied-flash" class="copied-flash">Copied</div>
  <script type="module" src="main.js"></script>
</body>
</html>
