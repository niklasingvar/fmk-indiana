<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indiana</title>
  <script>
    // Apply persisted theme before first paint to avoid a flash.
    try {
      document.documentElement.dataset.theme =
        localStorage.getItem("indiana.theme") || "system";
    } catch (_) { document.documentElement.dataset.theme = "system"; }
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --border: #1a1a1a;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --hover-bg: #f0f0f0;
      --dot-running: #1a7f37;
      --dot-stopped: #9b9b9b;
      --font-size: 12px;
    }
    /* system mode follows the OS; an explicit choice forces the palette. */
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        --bg: #0d0d0d;
        --border: #8a8a8a;
        --text: #e6e6e6;
        --text-secondary: #8a8a8a;
        --hover-bg: #1c1c1c;
        --dot-running: #3fb950;
        --dot-stopped: #6b6b6b;
      }
    }
    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --border: #8a8a8a;
      --text: #e6e6e6;
      --text-secondary: #8a8a8a;
      --hover-bg: #1c1c1c;
      --dot-running: #3fb950;
      --dot-stopped: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: var(--font-size);
      line-height: 1.4;
      color: var(--text);
      overflow: hidden;
    }
    #panel {
      margin: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      height: 26px;
    }
    .action { cursor: pointer; color: var(--text-secondary); }
    .action:hover { background: var(--hover-bg); color: var(--text); }
    .divider { border-top: 1px solid var(--border); }
    /*
     * Status row (top)
     */
    #status { justify-content: space-between; }
    #status-left { display: flex; align-items: center; gap: 6px; }
    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #status-dot.running { background: var(--dot-running); }
    #status-dot.stopped { background: var(--dot-stopped); }
    #status-dot.spinning {
      background: transparent;
      border: 1.5px solid var(--dot-stopped);
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-action {
      background: none;
      border: none;
      color: var(--text-secondary);
      font: inherit;
      cursor: pointer;
    }
    #status-action:hover { color: var(--text); }
    /*
     * Monitoring header + cogwheel
     */
    #monitoring {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      color: var(--text-secondary);
      position: relative;
    }
    #theme-cog {
      background: none;
      border: none;
      color: var(--text-secondary);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
    }
    #theme-cog:hover { color: var(--text); }
    #theme-menu {
      position: absolute;
      top: 24px;
      right: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      z-index: 10;
    }
    #theme-menu[hidden] { display: none; }
    #theme-menu button {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 4px 10px 4px 8px;
      background: none;
      border: none;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    #theme-menu button:hover { background: var(--hover-bg); }
    #theme-menu .mark { width: 8px; color: var(--text); }
    /*
     * Folder list
     */
    #folders { list-style: none; }
    .folder {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      height: 26px;
    }
    .folder:hover { background: var(--hover-bg); }
    .folder .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder .count {
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .folder .copy {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-secondary);
      font: inherit;
      cursor: pointer;
    }
    .folder .copy:hover { color: var(--text); }
    #empty {
      text-align: center;
      padding: 16px 10px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    #empty:hover { color: var(--text); }
    /*
     * Copied flash
     */
    .copied-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--text);
      color: var(--bg);
      padding: 3px 10px;
      border-radius: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .copied-flash.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="panel">
    <div id="status" class="row">
      <div id="status-left">
        <div id="status-dot" class="stopped"></div>
        <span id="status-label">server stopped</span>
      </div>
      <button id="status-action">start</button>
    </div>
    <div id="add-item" class="row action">
      <span class="label">+ add folder</span>
    </div>
    <div class="divider"></div>
    <div id="monitoring">
      <span>monitoring</span>
      <button id="theme-cog" title="theme">⚙</button>
      <div id="theme-menu" hidden>
        <button data-theme-choice="light"><span class="mark"></span>light</button>
        <button data-theme-choice="dark"><span class="mark"></span>dark</button>
        <button data-theme-choice="system"><span class="mark"></span>system</button>
      </div>
    </div>
    <ul id="folders"></ul>
    <div id="empty">monitor a folder…</div>
  </div>
  <div id="copied-flash" class="copied-flash">copied</div>
  <script type="module" src="main.js"></script>
</body>
</html>
