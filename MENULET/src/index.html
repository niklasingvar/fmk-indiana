<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indiana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      color: #1d1d1f;
      width: 320px;
      min-height: 200px;
      user-select: none;
      -webkit-user-select: none;
    }
    #panel {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #focus-section {
      padding: 12px 14px 8px;
    }
    #focus {
      width: 100%;
      border: none;
      border-bottom: 1px solid #d1d1d6;
      background: transparent;
      font: inherit;
      padding: 4px 0;
      outline: none;
    }
    #focus::placeholder { color: #aeaeb2; }
    #folder-section {
      flex: 1;
      padding: 8px 14px;
    }
    #folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    #folder-header span {
      font-size: 11px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #add-btn {
      background: none;
      border: 1px solid #c7c7cc;
      border-radius: 4px;
      width: 22px;
      height: 22px;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      color: #8e8e93;
    }
    #add-btn:hover { background: #e5e5ea; }
    #folders {
      list-style: none;
    }
    .folder {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .folder:hover { background: #e5e5ea; }
    .folder .basename {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder .count {
      font-size: 11px;
      color: #8e8e93;
      margin-left: 8px;
      flex-shrink: 0;
    }
    #empty-state {
      text-align: center;
      padding: 24px 0;
      color: #8e8e93;
      cursor: pointer;
      font-size: 12px;
    }
    #empty-state:hover { color: #1d1d1f; }
    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-top: 1px solid #d1d1d6;
      font-size: 11px;
    }
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    #status-dot.running { background: #34c759; }
    #status-dot.stopped { background: #aeaeb2; }
    #status-label { color: #8e8e93; }
    #status-action {
      background: none;
      border: 1px solid #c7c7cc;
      border-radius: 4px;
      padding: 2px 10px;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
      color: #8e8e93;
    }
    #status-action:hover { background: #e5e5ea; }
    .spinner {
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1.5px solid #aeaeb2;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .copied-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1d1d1f;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .copied-flash.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="panel">
    <div id="focus-section">
      <input type="text" id="focus" placeholder="What are you working on?">
    </div>
    <div id="folder-section">
      <div id="folder-header">
        <span>Monitored Folders</span>
        <button id="add-btn" title="Add folder">+</button>
      </div>
      <ul id="folders"></ul>
      <div id="empty-state" hidden>Monitor a folder →</div>
    </div>
    <div id="status-bar">
      <div style="display:flex;align-items:center">
        <div id="status-dot" class="stopped"></div>
        <span id="status-label">Server stopped</span>
      </div>
      <button id="status-action">▶</button>
    </div>
  </div>
  <div id="copied-flash" class="copied-flash">Copied ✓</div>
  <script type="module" src="main.js"></script>
</body>
</html>
