[prompts]
hate = "The user tagged this as hate. Explain to the user in a numbered list why he hates it."
love = "The user loves this. Keep it and apply the same pattern. Abstract the direction and update the nearest relevant spec so it stays directional."
keep = "Do not modify this."
fix = "Fix this. {message}"
elaborate = "Take action on this and elaborate the change: {message}"
question = "The user asks: {message}. Answer it."
question_empty = "The user does not understand this. Explain it."
note = "{message}"
action = "{message}"
todo = "{message}"
delete = "Take action on this and delete the targeted content. Confirm with the user before deleting: {message}"
